<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Vedligeholdelsesmatrix - DMP Logs</title>
    <style>
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; padding: 20px; 
            background-color: #121212; color: #e0e0e0; 
        }
        .container { 
            max-width: 1500px; margin: 0 auto; 
            background: #1e1e1e; padding: 25px; 
            border-radius: 4px; border: 1px solid #333;
        }
        .controls { 
            display: grid; grid-template-columns: 1fr 1fr 1fr; 
            gap: 15px; margin-bottom: 20px; 
            background: #252526; padding: 20px; border-radius: 4px; 
        }
        .full-width { grid-column: 1 / -1; }
        label { font-size: 0.8em; color: #aaa; display: block; margin-bottom: 5px; }
        input { 
            width: 100%; padding: 8px; 
            background: #333; border: 1px solid #444; 
            color: #fff; box-sizing: border-box; 
        }
        button { 
            padding: 10px; cursor: pointer; 
            background: #0078d4; color: white; 
            border: none; font-weight: bold; 
        }
        button:disabled { background: #444; cursor: not-allowed; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9em; }
        th { 
            background: #2d2d2d; text-align: left; padding: 12px; 
            border-bottom: 2px solid #444; color: #bbb; 
            cursor: pointer; user-select: none;
        }
        th:hover { background: #3a3a3a; color: #fff; }
        td { padding: 10px; border-bottom: 1px solid #333; }
        tr:hover { background-color: #252526; }
        .status { color: #00ff41; font-family: monospace; font-size: 0.9em; margin-bottom: 10px; }
        .date-cell { text-align: center; color: #4aa3df; font-weight: bold; }
        .sort-indicator { font-size: 0.8em; margin-left: 5px; color: #888; }
    </style>
</head>
<body>

<div class="container">
    <h2>Vedligeholdelsesoverblik (Matrix)</h2>
    
    <div class="controls">
        <div>
            <label>Fra Stationsnummer</label>
            <input type="number" id="startId" value="43000000">
        </div>
        <div>
            <label>Til Stationsnummer</label>
            <input type="number" id="endId" value="47000000">
        </div>
        <div>
            <label>Dato Interval (Fra)</label>
            <input type="date" id="startDate">
        </div>
        <div class="full-width">
            <button id="btnRun" onclick="generateMaintenanceMatrix()">Generer overblik</button>
        </div>
    </div>

    <div id="status" class="status">Klar...</div>

    <table id="matrixTable">
        <thead>
            <tr>
                <th onclick="sortBy('id')">ID <span id="ind-id" class="sort-indicator"></span></th>
                <th onclick="sortBy('name')">Stationsnavn <span id="ind-name" class="sort-indicator"></span></th>
                <th onclick="sortBy('loggerId')">Logger ID <span id="ind-loggerId" class="sort-indicator"></span></th>
                <th style="text-align:center" onclick="sortBy('batteri')">Skiftet batteri <span id="ind-batteri" class="sort-indicator"></span></th>
                <th style="text-align:center" onclick="sortBy('dageSidenBatteri')">Dage siden batteri <span id="ind-dageSidenBatteri" class="sort-indicator"></span></th>
                <th style="text-align:center" onclick="sortBy('tørremiddel')">Tørremiddel skiftet <span id="ind-tørremiddel" class="sort-indicator"></span></th>
                <th style="text-align:center" onclick="sortBy('tryksonde')">Renset tryksonde <span id="ind-tryksonde" class="sort-indicator"></span></th>
            </tr>
        </thead>
        <tbody id="matrixBody">
        </tbody>
    </table>
</div>

<script>
    const columns = [
        { key: 'batteri', searchTerms: ['batteri'] },
        { key: 'tørremiddel', searchTerms: ['tørremiddel'] },
        { key: 'tryksonde', searchTerms: ['tryksonde', 'renset tryk'] }
    ];
    
    let matrixData = [];
    let currentSort = { key: 'id', asc: true };

    window.addEventListener('DOMContentLoaded', () => {
        const d = new Date();
        d.setMonth(d.getMonth() - 18);
        document.getElementById('startDate').value = d.toISOString().split('T')[0];
    });

    function formatDanishDate(dateObj) {
        if (!dateObj) return "";
        return `${String(dateObj.getDate()).padStart(2, '0')}-${String(dateObj.getMonth()+1).padStart(2, '0')}-${dateObj.getFullYear()}`;
    }

    async function generateMaintenanceMatrix() {
        const startId = parseInt(document.getElementById('startId').value);
        const endId = parseInt(document.getElementById('endId').value);
        
        const startVal = document.getElementById('startDate').value;
        const todayVal = new Date().toISOString().split('T')[0];
        
        const dateFrom = `${startVal}T00:00Z`;
        const dateTo = `${todayVal}T23:59Z`;
        
        const btn = document.getElementById('btnRun');
        const statusDiv = document.getElementById('status');
        
        btn.disabled = true;
        matrixData = [];
        renderTableBody();
        
        try {
            statusDiv.innerText = "Henter stationsliste...";
            const respStations = await fetch("https://vandah.miljoeportal.dk/api/stations");
            const allStations = await respStations.json();
            
            const relevantStations = allStations.filter(s => {
                const id = parseInt(s.stationId);
                return id >= startId && id <= endId && 
                       (s.locationType || "").toLowerCase() === 'vandløb' && 
                       (s.stationOwnerName || "").toLowerCase().includes('miljøstyrelsen');
            });

            statusDiv.innerText = `Fundet ${relevantStations.length} stationer. Henter vedligeholdelsesdata...`;

            for (const station of relevantStations) {
                statusDiv.innerText = `Tjekker ${station.stationId}: ${station.name}...`;
                
                const rowData = { 
                    id: parseInt(station.stationId), 
                    name: station.name,
                    loggerId: station.loggerId || "-",
                    batteri: "", 
                    dageSidenBatteri: "",
                    tørremiddel: "", 
                    tryksonde: ""
                };

                try {
                    const urlLogs = `https://vandah.miljoeportal.dk/api/stations/logs?stationId=${station.stationId}&from=${dateFrom}&to=${dateTo}`;
                    const respLogs = await fetch(urlLogs);
                    
                    if (respLogs.ok) {
                        const json = await respLogs.json();
                        const logs = Array.isArray(json) ? json : (json.results || []);

                        const latestDates = { batteri: null, tørremiddel: null, tryksonde: null };

                        logs.forEach(l => {
                            const activity = (l.activityTxt || "").toLowerCase();
                            
                            if (l.dateTime) {
                                const currentDate = new Date(l.dateTime);
                                
                                columns.forEach(col => {
                                    if (col.searchTerms.some(term => activity.includes(term.toLowerCase()))) {
                                        if (!latestDates[col.key] || currentDate > latestDates[col.key]) {
                                            latestDates[col.key] = currentDate;
                                        }
                                    }
                                });
                            }
                        });

                        rowData.batteri = latestDates.batteri ? formatDanishDate(latestDates.batteri) : "";
                        rowData.tørremiddel = latestDates.tørremiddel ? formatDanishDate(latestDates.tørremiddel) : "";
                        rowData.tryksonde = latestDates.tryksonde ? formatDanishDate(latestDates.tryksonde) : "";

                        if (latestDates.batteri) {
                            const now = new Date();
                            const diffTime = now.getTime() - latestDates.batteri.getTime();
                            const diffDays = Math.floor(diffTime / (1000 * 3600 * 24));
                            rowData.dageSidenBatteri = diffDays >= 0 ? diffDays : 0;
                        }
                    }

                    matrixData.push(rowData);
                    renderTableBody();

                } catch (e) {
                    console.error(`Fejl ved ${station.stationId}:`, e);
                }
                
                await new Promise(r => setTimeout(r, 40));
            }
            
            statusDiv.innerText = `Færdig. Overblik genereret for ${relevantStations.length} stationer.`;
            updateSortIndicators();
        } catch (e) {
            statusDiv.innerText = "FEJL: Kunne ikke gennemføre scanning.";
            console.error(e);
        } finally {
            btn.disabled = false;
        }
    }

    function sortBy(key) {
        if (currentSort.key === key) {
            currentSort.asc = !currentSort.asc;
        } else {
            currentSort.key = key;
            currentSort.asc = true;
        }

        matrixData.sort((a, b) => {
            let valA = a[key];
            let valB = b[key];

            if (['batteri', 'tørremiddel', 'tryksonde'].includes(key)) {
                valA = parseDateForSort(valA);
                valB = parseDateForSort(valB);
                if (valA === 0 && valB !== 0) return 1;
                if (valB === 0 && valA !== 0) return -1;
            } else if (key === 'dageSidenBatteri') {
                valA = valA === "" ? Infinity : parseInt(valA);
                valB = valB === "" ? Infinity : parseInt(valB);
                if (valA === Infinity && valB !== Infinity) return 1;
                if (valB === Infinity && valA !== Infinity) return -1;
            } else if (typeof valA === 'string') {
                valA = valA.toLowerCase();
                valB = valB.toLowerCase();
            }

            if (valA < valB) return currentSort.asc ? -1 : 1;
            if (valA > valB) return currentSort.asc ? 1 : -1;
            return 0;
        });

        updateSortIndicators();
        renderTableBody();
    }

    function parseDateForSort(dateStr) {
        if (!dateStr) return 0;
        const parts = dateStr.split('-');
        if (parts.length === 3) {
            return parseInt(parts[2] + parts[1] + parts[0]);
        }
        return 0;
    }

    function updateSortIndicators() {
        ['id', 'name', 'loggerId', 'batteri', 'dageSidenBatteri', 'tørremiddel', 'tryksonde'].forEach(k => {
            document.getElementById(`ind-${k}`).innerText = '';
        });
        const indicator = document.getElementById(`ind-${currentSort.key}`);
        if (indicator) {
            indicator.innerText = currentSort.asc ? '▲' : '▼';
        }
    }

    function renderTableBody() {
        const tableBody = document.getElementById('matrixBody');
        tableBody.innerHTML = "";
        
        matrixData.forEach(row => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${row.id}</td>
                <td>${row.name}</td>
                <td>${row.loggerId}</td>
                <td class="date-cell">${row.batteri}</td>
                <td class="date-cell">${row.dageSidenBatteri}</td>
                <td class="date-cell">${row.tørremiddel}</td>
                <td class="date-cell">${row.tryksonde}</td>
            `;
            tableBody.appendChild(tr);
        });
    }
</script>

</body>
</html>
